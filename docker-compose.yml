services:
  ui:
    build: ./ui
    image: bray-music-ui:latest
    container_name: bray-music-ui
    restart: unless-stopped
    ports:
      - "7861:7861"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./outputs:/app/outputs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      - ACESTEP_URL=http://host.docker.internal:7860
      - WHISPER_URL=http://host.docker.internal:7862
      - COVER_ART_URL=http://host.docker.internal:7863
